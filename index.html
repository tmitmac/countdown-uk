<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdowns</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
}
.bar {
  transition: width 1s ease-in-out;
}
</style>
</head>

<body class="text-white font-sans min-h-screen flex items-center justify-center">

<div class="w-full max-w-2xl space-y-8 p-6">

  <h1 class="text-3xl font-bold text-center">Countdown</h1>

  <!-- Singapore, United Kingdom, and Ireland -->
  <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 shadow-lg">
    <a href="uk.html" class="hover:underline text-xl font-semibold mb-2">Singapore, United Kingdom, and Ireland 🇸🇬🇬🇧🇮🇪</a>
    <p id="countdown2" class="text-sm mb-3 opacity-80"></p>

    <div class="w-full bg-white/20 rounded-full h-4 overflow-hidden">
      <div id="bar2" class="bar bg-blue-400 h-4 rounded-full w-0"></div>
    </div>
  </div>
</div>

<script>
function setupCountdown(startDateStr, targetDateStr, countdownEl, barEl) {
  const start = new Date(startDateStr);
  const end = new Date(targetDateStr);

  function update() {
    const now = new Date();

    const total = end - start;
    const elapsed = now - start;
    const remaining = end - now;

    // Countdown text
    if (remaining <= 0) {
      countdownEl.innerText = "🎉 It's time!";
      barEl.style.width = "100%";
      return;
    }

    const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
    const hours = Math.floor((remaining / (1000 * 60 * 60)) % 24);

    countdownEl.innerText = `${days} days, ${hours} hours remaining`;

    // Progress calculation
    let progress = (elapsed / total) * 100;

    // Clamp between 0–100
    progress = Math.max(0, Math.min(100, progress));

    barEl.style.width = progress + "%";
  }

  update();
  setInterval(update, 1000 * 60);
}
// United Kingdom (started Jan 2026)
setupCountdown(
  "January 2, 2026 00:00:00",
  "May 23, 2026 07:10:00",
  document.getElementById("countdown2"),
  document.getElementById("bar2")
);
</script>

</body>
</html>
